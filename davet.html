<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davet — RetroSesler.com</title>
    <link rel="icon" type="image/png" href="assets/mikrofon.png">
    <link rel="apple-touch-icon" href="assets/mikrofon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Press Start 2P';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url(/assets/press-start-2p.ttf) format('truetype');
        }
        * { box-sizing: border-box; margin: 0; padding: 0 }
        body {
            font-family: Tahoma, Verdana, sans-serif; font-size: 13px;
            background: #3A6EA5;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08), transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,60,120,0.15), transparent 50%),
                linear-gradient(180deg, #3A6EA5 0%, #2B5A8C 50%, #1E4070 100%);
            min-height: 100vh; color: #222;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .invite-panel {
            background: linear-gradient(180deg, #FAFAF5 0%, #F0EDE4 100%);
            border: 2px solid #A09880; border-radius: 6px; overflow: hidden;
            box-shadow: 2px 3px 14px rgba(0,0,0,0.28), inset 0 1px 0 #fff;
            max-width: 480px; width: 100%;
        }
        .win-titlebar {
            background: linear-gradient(180deg, #4A90D9 0%, #2E6BBF 40%, #1E5AA8 100%);
            color: #fff; font-size: 12px; font-weight: bold;
            padding: 6px 12px;
            display: flex; align-items: center; gap: 8px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.4);
        }
        .win-titlebar img { width: 16px; height: 16px; image-rendering: pixelated }
        .win-body { padding: 28px 28px 22px; text-align: center; }
        .brand {
            font-family: 'Press Start 2P', monospace;
            font-size: 16px; color: #C0392B; text-decoration: none;
            text-shadow: 2px 2px 0 #E74C3C, 3px 3px 0 rgba(0,0,0,0.15);
            letter-spacing: 1px; margin-bottom: 18px; display: inline-block;
            transition: transform 0.15s;
            cursor: pointer;
        }
        .brand:hover {
            transform: scale(1.05);
        }
        .brand span { color: #2E86C1 }
        .big-icon {
            width: 64px; height: 64px;
            image-rendering: pixelated;
            margin: 0 auto 14px; display: block;
        }
        h1 { font-size: 18px; color: #1E4070; margin-bottom: 8px; line-height: 1.3 }
        .inviter {
            display: inline-block;
            background: #FFF9E6; border: 1px dashed #E0D5A0;
            padding: 4px 12px; border-radius: 3px;
            font-weight: bold; color: #8B6914; margin: 0 4px;
        }
        p { line-height: 1.55; color: #444; margin: 8px 0 }
        .sub { font-size: 12px; color: #777; font-style: italic; margin-bottom: 18px }
        .actions {
            margin-top: 18px; display: flex; gap: 10px; justify-content: center;
        }
        .btn {
            padding: 10px 22px; font-family: Tahoma; font-size: 13px;
            font-weight: bold; cursor: pointer; border-radius: 0;
            text-decoration: none; display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(180deg, #4A90D9 0%, #2E6BBF 100%);
            color: #fff; border: 1px solid #1E5AA8;
            box-shadow: 1px 1px 0 rgba(0,0,0,0.18);
        }
        .btn-primary:hover { filter: brightness(1.08) }
        .btn-primary:active { transform: translateY(1px) }
        .countdown { font-size: 11px; color: #888; margin-top: 14px; }
        .error { color: #C0392B; font-weight: bold; padding: 12px }
    
        /* === Emoji ikon DNA (oda kart stili) === */
        .ico-emoji {
            display: inline-block;
            font-size: 14px;
            line-height: 1;
            vertical-align: middle;
            margin-right: 2px;
        }
        .win-titlebar .ico-emoji {
            font-size: 13px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
        }
        /* H2 başlıklarda renkli emoji badge (oda kart stili) */
        .sec-h2 {
            padding-left: 0 !important;
            background: none !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sec-h2-ico {
            display: inline-flex;
            width: 26px; height: 26px;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #4A90D9 0%, #2E6BBF 100%);
            color: #fff;
            border-radius: 5px;
            font-size: 14px;
            box-shadow: 1px 1px 0 rgba(0,0,0,0.15);
            flex-shrink: 0;
        }
        /* Davet sayfasındaki büyük ikon */
        .invite-panel .ico-emoji[data-ico="mailbox"],
        .big-icon-emoji {
            display: block;
            width: 64px; height: 64px;
            line-height: 64px; text-align: center;
            font-size: 38px;
            background: linear-gradient(135deg, #FFF9E6, #FFE9A8);
            border: 2px solid #D4B852;
            border-radius: 8px;
            margin: 0 auto 14px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.15);
        }
        /* Profil sayfasında "bulunamadı" büyük ikon */
        .p-not-found .ico-emoji {
            display: block;
            font-size: 38px;
            line-height: 1;
            margin: 0 auto 14px;
            color: #888;
        }
        /* Mesajlar widget'ı boşken */
        .msg-empty .ico-emoji {
            display: block;
            font-size: 22px;
            margin: 0 auto 6px;
        }
</style>
    <link rel="stylesheet" href="/assets/tokens.css">
</head>
<body>
    <div class="invite-panel">
        <div class="win-titlebar">
            <span class="ico-emoji" data-ico="contacts">👥</span>
            <span>Sana bir davet var</span>
        </div>
        <div class="win-body" id="body">
            <a href="/" class="brand">Retro<span>Sesler</span></a>
            <span class="ico-emoji" data-ico="mailbox">📬</span>
            <div id="content">Davet kontrol ediliyor...</div>
        </div>
    </div>

    <script>
        const code = location.pathname.split('/').filter(Boolean)[1] || '';
        const contentEl = document.getElementById('content');

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        async function checkInvite() {
            if (!code) {
                contentEl.innerHTML = '<div class="error">Geçersiz davet adresi</div>';
                return;
            }
            try {
                const res = await fetch('/api/invite/lookup/' + encodeURIComponent(code));
                const data = await res.json();
                if (!data.success) {
                    contentEl.innerHTML = `
                        <h1>Bu davet linki geçersiz</h1>
                        <p class="sub">Belki süresi geçmiş veya yanlış kopyalandı.</p>
                        <div class="actions">
                            <a href="/" class="btn btn-primary">Yine de katıl ▶</a>
                        </div>
                    `;
                    return;
                }
                // Davet'i tarayıcıda sakla — kayıt sırasında gönderilir
                localStorage.setItem('rs_pending_invite', code);
                localStorage.setItem('rs_invited_by', data.inviter);

                contentEl.innerHTML = `
                    <h1><span class="inviter">${esc(data.inviter)}</span><br>seni RetroSesler'e davet ediyor</h1>
                    <p class="sub">2000'lerin sohbet kültürü ile modern teknolojinin buluştuğu yer</p>
                    <p>Hesap açıp odalara katıl — ses, müzik, sohbet seni bekliyor.</p>
                    <div class="actions">
                        <a href="/" class="btn btn-primary">Katıl ▶</a>
                    </div>
                    <div class="countdown" id="cnt">5 saniye sonra otomatik yönlendiriliyor...</div>
                `;
                // Auto-redirect 5sn
                let s = 5;
                const t = setInterval(() => {
                    s--;
                    if (s <= 0) { clearInterval(t); location.href = '/'; }
                    else { const el = document.getElementById('cnt'); if (el) el.textContent = `${s} saniye sonra otomatik yönlendiriliyor...`; }
                }, 1000);
            } catch (err) {
                contentEl.innerHTML = '<div class="error">Sunucu hatası: ' + esc(err.message) + '</div>';
            }
        }
        checkInvite();
    </script>
</body>
</html>
